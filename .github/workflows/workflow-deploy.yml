name: 'Deploy Infrastructure via Terraform'

on:
  workflow_call:
    inputs:
      aws_region:
        description: AWS Region to deploy to
        required: true
        type: string
      app_name:
        description: Name of the application
        required: true
        type: string
      deployment_env:
        description: Environment to deploy to (e.g., dev, prod)
        required: true
        type: string
      app_version:
        description: Version of the application
        required: false
        type: string
    secrets:
      AWS_ROLE_ARN_S3_CLOUDFRONT:
        required: true

jobs:
  deploy-via-hcp-terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: terraform/frontend/dist/ # upload-artifact strips the dir prefix, so contents land here directly

      - name: Debug - List downloaded artifact contents
        run: |
          echo "=== terraform/frontend/ ==="
          ls -la terraform/frontend/
          echo "=== terraform/frontend/dist/ ==="
          ls -la terraform/frontend/dist/ || echo "dist/ does not exist"
          echo "=== Full tree ==="
          find terraform/frontend -type f | sort

      - name: Deploy Frontend Config via Terraform
        uses: enpicie/gh-action-workflow-terraform-run@v1.0.0
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN_S3_CLOUDFRONT }}
          state_key: projects/${{ inputs.app_name }}/${{ inputs.deployment_env }}/frontend.tfstate
          aws_region: ${{ inputs.aws_region }}
          tf_directory: ./terraform/frontend
          tf_vars: |
            TF_VAR_app_name=${{ inputs.app_name }}-frontend
            TF_VAR_deployment_env=${{ inputs.deployment_env }}
            TF_VAR_aws_region=${{ inputs.aws_region }}
            TF_VAR_domain_name=www.findmyfgc.cc
